services:
  - type: web
    name: pesapips-backend
    runtime: python
    repo: https://github.com/YOUR_USERNAME/pesapips-backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.0
      - key: DATABASE_URL
        fromDatabase:
          name: pesapips-db
          property: connectionString

databases:
  - name: pesapips-db
    plan: free
    databaseName: pesapips_db
    user: pesapips_user
