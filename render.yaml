services:
- type: web
  name: pesapips-backend
  runtime: python
  plan: free
  buildCommand: pip install -r requirements.txt
  startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
  healthCheckPath: /health
  envVars:
  - key: PYTHON_VERSION
    value: "3.13.0"
  - key: DATABASE_URL
    sync: false
  - key: SECRET_KEY
    sync: false
  - key: FERNET_KEY
    sync: false
  - key: SMTP_USER
    sync: false
  - key: SMTP_PASS
    sync: false
  - key: TWELVE_DATA_KEY
    sync: false
  - key: CORS_ORIGINS
    value: "https://pesapips.vercel.app,https://pesapips.com,http://localhost:5173"
  - key: TELEGRAM_BOT_TOKEN
    sync: false
  - key: TELEGRAM_CHAT_ID
    sync: false
  - key: FLW_SECRET_KEY
    sync: false
  - key: FLW_PUBLIC_KEY
    sync: false
  - key: MT5_BRIDGE_PATH
    sync: false
